name: Build Android APK

# Le script se déclenche à chaque fois que tu fais un "git push" sur la branche principale
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Java (requis pour Android)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Installe Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Met en cache pour que les prochains builds soient plus rapides

      # 4. Récupère les dépendances (http, dynamic_color, etc.)
      - name: Install dependencies
        run: flutter pub get

      # 5. Compile l'APK en mode Release
      - name: Build APK
        run: flutter build apk --release

      # 6. Rend l'APK disponible au téléchargement sur GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laststats-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk