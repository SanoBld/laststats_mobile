name: Build macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build macOS avec Version Dynamique
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //g' | cut -d'+' -f1)
          flutter build macos --release --dart-define=APP_VERSION="$VERSION+${{ github.run_number }}"

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: laststats-macos-app
          path: build/macos/Build/Products/Release/