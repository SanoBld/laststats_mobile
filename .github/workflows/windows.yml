name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build Windows avec Version Dynamique
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //g' | cut -d'+' -f1)
          flutter build windows --release --dart-define=APP_VERSION="$VERSION+${{ github.run_number }}"

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: laststats-windows-app
          path: build/windows/x64/runner/Release/