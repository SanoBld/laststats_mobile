name: laststats_mobile
description: "LastStats — Your Last.fm stats, reinvented."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  dynamic_color: ^1.8.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.0
  palette_generator: ^0.3.3
  flutter_local_notifications: ^18.0.0   # Local notifications (scrobble events)
  workmanager: ^0.6.0                    # Background tasks without the app open — v0.5.2 incompatible avec Flutter v2 embedding
  web: ^1.1.0                            # Remplace dart:html (déprécié) pour le backend IndexedDB web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# ── App icon ───────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1558D6"
  adaptive_icon_foreground: "assets/images/icon-512.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/images/icon-512.png"
    icon_size: 48
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/