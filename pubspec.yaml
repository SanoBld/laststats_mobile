name: laststats_mobile
description: "LastStats — Your Last.fm stats, reinvented."
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  dynamic_color: ^1.8.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0      # Ouvre les liens GitHub, Last.fm, etc.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/        # Logo icon.png (512×512 recommandé)
